<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomoku</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <form id="configForm">
        <div>
            <label for="rows">Rows (M):</label>
            <input type="number" id="rows" name="rows" min="3" value="3">
        </div>
        
        <div>
            <label for="cols">Columns (N):</label>
            <input type="number" id="cols" name="cols" min="3" value="3">
        </div>

        <div>
            <label for="winLength">Win Length (K):</label>
            <input type="number" id="winLength" name="winLength" min="3" value="3">
        </div>

        <div>
            <label for="player">Player:</label>
            <select id="player" name="player">
                <option value="RandomPlayer">RandomPlayer</option>
                <option value="MCTSPlayer">MCTSPlayer</option>
            </select>
        </div>

        <button type="button" onclick="startGame()">Start Game</button>
    </form>

    <div id="game">
        <div id="board"></div>
        <div id="message"></div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
